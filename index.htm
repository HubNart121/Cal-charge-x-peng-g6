<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPeng G6 Premium Charging Calculator</title>
    <!-- Load React, Babel, and Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Lucide Core (เสถียรกว่าสำหรับการรันแบบ Single File) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Load html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Anuphan', sans-serif; 
            background-color: #f1f5f9;
        }
        .gradient-blue {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }
        .gradient-dark {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
        }
        input[type="range"] {
            -webkit-appearance: none;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            background-image: linear-gradient(#3b82f6, #3b82f6);
            background-repeat: no-repeat;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border: 3px solid #3b82f6;
        }
        .battery-segment {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ส่วนประกอบไอคอนที่แก้ไขปัญหา ReferenceError
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    window.lucide.createIcons({
                        targets: [iconRef.current]
                    });
                }
            }, [name]);
            return <i data-lucide={name} ref={iconRef} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const batteryCapacity = 66.0;
            const [startSoC, setStartSoC] = useState(20);
            const [targetSoC, setTargetSoC] = useState(100);
            const [chargerPower, setChargerPower] = useState(7.4); 
            const [efficiency, setEfficiency] = useState(90); 
            const [electricityRate, setElectricityRate] = useState(4.7);
            const [kmPerKwh, setKmPerKwh] = useState(7.75);
            const [isGenerating, setIsGenerating] = useState(false);
            const reportRef = useRef(null);

            const [results, setResults] = useState({
                energyNeeded: 0,
                timeRequired: { hours: 0, minutes: 0 },
                totalCost: 0,
                gridEnergy: 0,
                addedRange: 0
            });

            const handleStartSoCChange = (val) => {
                if (val === '') { setStartSoC(''); return; }
                const num = Math.min(100, Math.max(0, parseInt(val)));
                if (!isNaN(num)) {
                    setStartSoC(num);
                    if (num > (targetSoC === '' ? 0 : targetSoC)) setTargetSoC(num);
                }
            };

            const handleTargetSoCChange = (val) => {
                if (val === '') { setTargetSoC(''); return; }
                const num = Math.min(100, Math.max(0, parseInt(val)));
                if (!isNaN(num)) setTargetSoC(num);
            };

            const downloadReport = async () => {
                if (!reportRef.current || typeof html2canvas === 'undefined') return;
                setIsGenerating(true);
                
                try {
                    window.scrollTo(0, 0);
                    const canvas = await html2canvas(reportRef.current, {
                        backgroundColor: '#f1f5f9',
                        scale: 3, 
                        useCORS: true,
                        allowTaint: true,
                        width: reportRef.current.offsetWidth,
                        height: reportRef.current.offsetHeight,
                        logging: false
                    });
                    
                    const image = canvas.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.href = image;
                    link.download = `XPeng-G6-Report-${new Date().getTime()}.png`;
                    link.click();
                } catch (err) {
                    console.error("Capture Failed:", err);
                } finally {
                    setIsGenerating(false);
                }
            };

            useEffect(() => {
                const sSoC = startSoC === '' ? 0 : startSoC;
                const tSoC = targetSoC === '' ? 0 : targetSoC;
                const socDiff = Math.max(0, tSoC - sSoC);
                const energyNeededToBattery = (batteryCapacity * socDiff) / 100;
                const energyFromGrid = energyNeededToBattery / (efficiency / 100);
                const hoursDecimal = energyNeededToBattery / (chargerPower * (efficiency / 100));
                const h = Math.floor(hoursDecimal);
                const m = Math.round((hoursDecimal - h) * 60);
                const cost = energyFromGrid * electricityRate;
                const range = energyNeededToBattery * kmPerKwh;

                setResults({
                    energyNeeded: energyNeededToBattery.toFixed(2),
                    gridEnergy: energyFromGrid.toFixed(2),
                    timeRequired: { hours: h, minutes: m },
                    totalCost: cost.toFixed(2),
                    addedRange: Math.round(range)
                });
            }, [startSoC, targetSoC, chargerPower, efficiency, electricityRate, kmPerKwh]);

            return (
                <div className="min-h-screen pb-12">
                    <div className="max-w-2xl mx-auto px-2 pt-8">
                        
                        {/* ส่วนที่ใช้สร้างรูปภาพ */}
                        <div ref={reportRef} data-report-container className="bg-slate-100 p-4 md:p-8 rounded-[3rem]">
                            
                            {/* ส่วนหัวแอป */}
                            <header className="flex items-center justify-between mb-8 px-4">
                                <div className="flex items-center gap-4">
                                    <div className="w-14 h-14 gradient-blue rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-200">
                                        <Icon name="zap" size={28} />
                                    </div>
                                    <div>
                                        <h1 className="text-2xl font-bold text-slate-800 leading-none">XPeng G6</h1>
                                        <p className="text-sm text-slate-500 font-medium mt-1">Standard Range • 66 kWh</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">Status</p>
                                    <div className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">Connected</div>
                                </div>
                            </header>

                            <div className="grid gap-6">
                                
                                {/* การตั้งค่า */}
                                <section className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200/50">
                                    <div className="flex items-center gap-2 mb-8 text-blue-600">
                                        <Icon name="settings-2" size={18} />
                                        <h2 className="font-bold text-slate-800 uppercase tracking-wide text-sm leading-none">Charging Configuration</h2>
                                    </div>

                                    {/* แถบกราฟิกแบตเตอรี่ */}
                                    <div className="mb-10 px-1">
                                        <div className="h-8 w-full bg-slate-100 rounded-2xl overflow-hidden flex p-1.5 relative border border-slate-200 shadow-inner">
                                            <div 
                                                className="h-full bg-blue-500/10 rounded-xl battery-segment"
                                                style={{ width: `${startSoC}%` }}
                                            ></div>
                                            <div 
                                                className="h-full gradient-blue rounded-xl battery-segment shadow-md"
                                                style={{ width: `${Math.max(0, targetSoC - startSoC)}%` }}
                                            ></div>
                                        </div>
                                        
                                        <div className="flex justify-between mt-4 px-2">
                                            <div className="w-24">
                                                <span className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Start</span>
                                                <div className="flex items-center gap-1">
                                                    <input 
                                                        type="number" value={startSoC} onChange={(e) => handleStartSoCChange(e.target.value)}
                                                        className="w-14 text-2xl font-black text-blue-600 bg-transparent outline-none"
                                                    />
                                                    <span className="text-blue-600 font-bold text-lg">%</span>
                                                </div>
                                            </div>
                                            <div className="flex items-center justify-center">
                                                <Icon name="arrow-right" size={20} className="text-slate-300" />
                                            </div>
                                            <div className="w-24 text-right">
                                                <span className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 text-green-400">Target</span>
                                                <div className="flex items-center gap-1 justify-end">
                                                    <input 
                                                        type="number" value={targetSoC} onChange={(e) => handleTargetSoCChange(e.target.value)}
                                                        className="w-14 text-2xl font-black text-green-600 bg-transparent outline-none text-right"
                                                    />
                                                    <span className="text-green-600 font-bold text-lg">%</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-8 space-y-6">
                                            <input type="range" min="0" max="100" value={startSoC === '' ? 0 : startSoC} onChange={(e) => handleStartSoCChange(e.target.value)} className="w-full" />
                                            <input type="range" min="0" max="100" value={targetSoC === '' ? 0 : targetSoC} onChange={(e) => handleTargetSoCChange(e.target.value)} className="w-full" />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-3 gap-3">
                                        <div className="p-4 bg-slate-50 rounded-3xl border border-slate-100">
                                            <label className="block text-[9px] font-bold text-slate-400 uppercase mb-2 text-center tracking-tighter">Wallbox (kW)</label>
                                            <input type="number" step="0.1" value={chargerPower} onChange={(e) => setChargerPower(parseFloat(e.target.value))} className="w-full bg-transparent font-bold text-slate-800 outline-none text-center text-lg" />
                                        </div>
                                        <div className="p-4 bg-slate-50 rounded-3xl border border-slate-100">
                                            <label className="block text-[9px] font-bold text-slate-400 uppercase mb-2 text-center tracking-tighter">Rate (฿)</label>
                                            <input type="number" step="0.1" value={electricityRate} onChange={(e) => setElectricityRate(parseFloat(e.target.value))} className="w-full bg-transparent font-bold text-slate-800 outline-none text-center text-lg" />
                                        </div>
                                        <div className="p-4 bg-slate-50 rounded-3xl border border-slate-100">
                                            <label className="block text-[9px] font-bold text-slate-400 uppercase mb-2 text-center text-blue-500 tracking-tighter">km/kWh</label>
                                            <input type="number" step="0.1" value={kmPerKwh} onChange={(e) => setKmPerKwh(parseFloat(e.target.value))} className="w-full bg-transparent font-bold text-blue-600 outline-none text-center text-lg" />
                                        </div>
                                    </div>
                                </section>

                                {/* สรุปผลวิเคราะห์ */}
                                <section className="gradient-dark text-white p-8 rounded-[3rem] shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none text-blue-400">
                                        <Icon name="zap" size={200} />
                                    </div>
                                    
                                    <div className="relative z-10">
                                        <div className="flex items-center gap-2 mb-10 bg-white/10 w-fit px-4 py-2 rounded-full border border-white/10">
                                            <Icon name="navigation" size={14} className="text-blue-400" />
                                            <span className="text-[10px] font-bold uppercase tracking-widest text-blue-200 leading-none">Analysis Summary</span>
                                        </div>

                                        <div className="text-center mb-12">
                                            <span className="text-xs font-semibold text-slate-400 uppercase tracking-[0.3em] block mb-4">ระยะทางที่วิ่งได้เพิ่มขึ้น</span>
                                            <div className="flex items-baseline justify-center gap-3">
                                                <span className="text-8xl font-black tracking-tighter text-blue-500">
                                                    +{results.addedRange}
                                                </span>
                                                <span className="text-2xl font-bold text-slate-500 uppercase tracking-widest">km</span>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4 mb-10">
                                            <div className="p-6 bg-white/5 rounded-[2rem] border border-white/10 text-center">
                                                <Icon name="clock" size={20} className="mx-auto mb-3 text-blue-400" />
                                                <span className="text-[10px] text-slate-500 uppercase tracking-widest block mb-2 font-medium">เวลาชาร์จประมาณ</span>
                                                <div className="text-3xl font-black">
                                                    {results.timeRequired.hours}<span className="text-sm font-medium text-slate-500 ml-1 uppercase">h</span>
                                                    {results.timeRequired.minutes}<span className="text-sm font-medium text-slate-500 ml-1 uppercase">m</span>
                                                </div>
                                            </div>
                                            <div className="p-6 bg-white/5 rounded-[2rem] border border-white/10 text-center">
                                                <Icon name="banknote" size={20} className="mx-auto mb-3 text-green-400" />
                                                <span className="text-[10px] text-slate-500 uppercase tracking-widest block mb-2 font-medium text-center">ค่าไฟฟ้าประมาณ</span>
                                                <div className="text-3xl font-black text-green-400">
                                                    {results.totalCost}<span className="text-sm font-medium text-slate-500 ml-1">฿</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="pt-8 border-t border-white/10 flex justify-between px-4">
                                            <div>
                                                <p className="text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-1 text-slate-400">Energy Added</p>
                                                <p className="text-md font-bold text-white leading-none tracking-tight">{results.energyNeeded} <span className="text-slate-500 font-normal text-xs uppercase">kWh</span></p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-1 text-slate-400 text-right">Total Grid Use</p>
                                                <p className="text-md font-bold text-white leading-none tracking-tight text-right">{results.gridEnergy} <span className="text-slate-500 font-normal text-xs uppercase">kWh</span></p>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* ข้อแนะนำถนอมแบตเตอรี่ */}
                                <section className="bg-emerald-50/50 p-6 rounded-[2.5rem] border border-emerald-200/50 relative overflow-hidden shadow-sm">
                                    <div className="flex items-center gap-3 mb-6 text-emerald-800">
                                        <div className="w-8 h-8 bg-emerald-100 rounded-xl flex items-center justify-center text-emerald-600">
                                            <Icon name="shield-check" size={18} />
                                        </div>
                                        <h2 className="font-bold text-xs uppercase tracking-[0.15em] leading-none">Battery Preservation Tips</h2>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                                        <div className="bg-white/80 p-4 rounded-2xl border border-emerald-100/50 flex gap-4 items-start shadow-sm">
                                            <div className="text-emerald-500 font-black text-sm">01</div>
                                            <p className="text-[11px] text-emerald-900 font-medium leading-relaxed"><b>20-80% Daily:</b> ช่วงที่แบตเตอรี่เสถียรที่สุดเพื่อยืดอายุเซลล์สูงสุดสำหรับการใช้งานประจำวัน</p>
                                        </div>
                                        <div className="bg-white/80 p-4 rounded-2xl border border-emerald-100/50 flex gap-4 items-start shadow-sm">
                                            <div className="text-emerald-500 font-black text-sm">02</div>
                                            <p className="text-[11px] text-emerald-900 font-medium leading-relaxed"><b>Weekly 100%:</b> ควรชาร์จเต็มสัปดาห์ละครั้ง เพื่อปรับสมดุล (BMS Calibration) สำหรับแบต LFP</p>
                                        </div>
                                    </div>
                                </section>

                                <footer className="text-center py-6">
                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-[0.4em]">XPeng G6 Assistant • {new Date().toLocaleDateString('th-TH')}</p>
                                </footer>
                            </div>
                        </div>

                        {/* ปุ่มกดบันทึกรายงาน */}
                        <div className="mt-8 px-4 flex flex-col gap-4">
                            <button 
                                onClick={downloadReport} 
                                disabled={isGenerating} 
                                className={`group flex items-center justify-center gap-4 w-full p-6 rounded-[2.5rem] font-bold transition-all shadow-2xl active:scale-95 ${isGenerating ? 'bg-slate-200 text-slate-400' : 'gradient-blue text-white shadow-blue-200 hover:shadow-blue-300'}`}
                            >
                                {isGenerating ? <Icon name="loader-2" className="animate-spin" size={24} /> : <Icon name="camera" className="group-hover:scale-110 transition-transform" size={24} />}
                                <span className="text-xl">{isGenerating ? 'กำลังสร้างรูปภาพ...' : 'บันทึกรายงานเป็นรูปภาพ'}</span>
                            </button>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
