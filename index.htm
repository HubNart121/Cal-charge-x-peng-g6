<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPeng G6 Standard Charging Calculator</title>
    <!-- Load React, Babel, and Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Load html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap');
        body { font-family: 'Anuphan', sans-serif; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #2563eb;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Icon Component to use Lucide in CDN mode
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        targets: [iconRef.current]
                    });
                }
            }, [name]);
            return <i data-lucide={name} ref={iconRef} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const batteryCapacity = 66.0;
            const [startSoC, setStartSoC] = useState(20);
            const [targetSoC, setTargetSoC] = useState(100);
            const [chargerPower, setChargerPower] = useState(7.4); 
            const [efficiency, setEfficiency] = useState(90); 
            const [electricityRate, setElectricityRate] = useState(4.7);
            const [kmPerKwh, setKmPerKwh] = useState(6.6);
            const [isGenerating, setIsGenerating] = useState(false);
            const reportRef = useRef(null);

            const [results, setResults] = useState({
                energyNeeded: 0,
                timeRequired: { hours: 0, minutes: 0 },
                totalCost: 0,
                gridEnergy: 0,
                addedRange: 0
            });

            const handleStartSoCChange = (val) => {
                const num = Math.min(100, Math.max(0, parseInt(val) || 0));
                setStartSoC(num);
                if (num > targetSoC) setTargetSoC(num);
            };

            const handleTargetSoCChange = (val) => {
                const num = Math.min(100, Math.max(startSoC, parseInt(val) || 0));
                setTargetSoC(num);
            };

            const downloadReport = async () => {
                if (!reportRef.current) return;
                setIsGenerating(true);
                try {
                    const canvas = await html2canvas(reportRef.current, {
                        backgroundColor: '#f8fafc',
                        scale: 2,
                        logging: false,
                        useCORS: true
                    });
                    const image = canvas.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.href = image;
                    link.download = `XPeng-G6-Report-${new Date().getTime()}.png`;
                    link.click();
                } catch (err) {
                    console.error("Failed to generate image", err);
                } finally {
                    setIsGenerating(false);
                }
            };

            useEffect(() => {
                const socDiff = Math.max(0, targetSoC - startSoC);
                const energyNeededToBattery = (batteryCapacity * socDiff) / 100;
                const energyFromGrid = energyNeededToBattery / (efficiency / 100);
                const hoursDecimal = energyNeededToBattery / (chargerPower * (efficiency / 100));
                const h = Math.floor(hoursDecimal);
                const m = Math.round((hoursDecimal - h) * 60);
                const cost = energyFromGrid * electricityRate;
                const range = energyNeededToBattery * kmPerKwh;

                setResults({
                    energyNeeded: energyNeededToBattery.toFixed(2),
                    gridEnergy: energyFromGrid.toFixed(2),
                    timeRequired: { hours: h, minutes: m },
                    totalCost: cost.toFixed(2),
                    addedRange: Math.round(range)
                });
            }, [startSoC, targetSoC, chargerPower, efficiency, electricityRate, kmPerKwh]);

            return (
                <div className="min-h-screen p-4 md:p-8 text-slate-900">
                    <div className="max-w-xl mx-auto">
                        <header className="mb-8 text-center">
                            <div className="inline-flex items-center justify-center p-3 bg-blue-600 text-white rounded-2xl mb-4 shadow-lg shadow-blue-200">
                                <Icon name="zap" size={32} />
                            </div>
                            <h1 className="text-3xl font-bold text-slate-800">XPeng G6 Standard</h1>
                            <p className="text-slate-500 mt-2">คำนวณเวลา ค่าไฟ และระยะทาง (66.0 kWh)</p>
                        </header>

                        <div className="grid gap-6">
                            <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                <div className="flex items-center gap-2 mb-6 text-blue-600 font-semibold">
                                    <Icon name="settings" size={20} />
                                    <h2>ตั้งค่าการชาร์จ</h2>
                                </div>
                                <div className="space-y-8">
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="space-y-3">
                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">เริ่มที่ (%)</label>
                                            <input type="number" value={startSoC} onChange={(e) => handleStartSoCChange(e.target.value)} className="w-full p-2 text-xl font-bold text-blue-600 bg-slate-50 border border-slate-200 rounded-xl outline-none" />
                                            <input type="range" min="0" max="100" value={startSoC} onChange={(e) => handleStartSoCChange(e.target.value)} className="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer" />
                                        </div>
                                        <div className="space-y-3">
                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 text-right block">เป้าหมาย (%)</label>
                                            <input type="number" value={targetSoC} onChange={(e) => handleTargetSoCChange(e.target.value)} className="w-full p-2 text-xl font-bold text-green-600 bg-slate-50 border border-slate-200 rounded-xl outline-none text-right" />
                                            <input type="range" min="0" max="100" value={targetSoC} onChange={(e) => handleTargetSoCChange(e.target.value)} className="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider">กำลังไฟ (kW)</label>
                                            <input type="number" step="0.1" value={chargerPower} onChange={(e) => setChargerPower(parseFloat(e.target.value))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider">ค่าไฟ (บาท/หน่วย)</label>
                                            <input type="number" step="0.01" value={electricityRate} onChange={(e) => setElectricityRate(parseFloat(e.target.value))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold" />
                                        </div>
                                        <div className="col-span-2">
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider">อัตราประหยัด (km/kWh)</label>
                                            <input type="number" step="0.1" value={kmPerKwh} onChange={(e) => setKmPerKwh(parseFloat(e.target.value))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-blue-600" />
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <div ref={reportRef} className="p-4 rounded-[40px] -m-4">
                                <section className="bg-slate-900 text-white p-8 rounded-3xl shadow-xl">
                                    <div className="flex justify-between items-start mb-6 border-b border-white/10 pb-4">
                                        <div>
                                            <h3 className="text-blue-400 font-bold uppercase tracking-widest text-xs">Charging Report</h3>
                                            <p className="text-white font-semibold">XPeng G6 Standard (66kWh)</p>
                                        </div>
                                        <Icon name="zap" size={20} className="text-blue-500" />
                                    </div>
                                    <div className="grid grid-cols-1 gap-4 text-center">
                                        <div className="p-6 bg-blue-600/20 rounded-2xl border border-blue-500/30">
                                            <span className="text-sm font-medium text-blue-300 block mb-1">ระยะทางที่เพิ่มขึ้น</span>
                                            <div className="text-6xl font-bold text-blue-400">+{results.addedRange}<span className="text-xl ml-2 uppercase">km</span></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="p-4 bg-white/5 rounded-2xl border border-white/10">
                                                <span className="text-[10px] text-slate-400 block uppercase mb-1">เวลาชาร์จ</span>
                                                <div className="text-2xl font-bold">{results.timeRequired.hours} ชม. {results.timeRequired.minutes} น.</div>
                                            </div>
                                            <div className="p-4 bg-white/5 rounded-2xl border border-white/10">
                                                <span className="text-[10px] text-slate-400 block uppercase mb-1">ค่าไฟประมาณ</span>
                                                <div className="text-2xl font-bold text-green-400">{results.totalCost} บ.</div>
                                            </div>
                                        </div>
                                    </div>
                                </section>
                            </div>

                            <button onClick={downloadReport} disabled={isGenerating} className={`flex items-center justify-center gap-3 w-full p-5 rounded-3xl font-bold transition-all shadow-lg ${isGenerating ? 'bg-slate-200 text-slate-500' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                                <Icon name={isGenerating ? "loader-2" : "download"} className={isGenerating ? "animate-spin" : ""} />
                                {isGenerating ? 'กำลังสร้างรูปภาพ...' : 'ดาวน์โหลดรายงาน (PNG)'}
                            </button>

                            <section className="bg-emerald-50 p-6 rounded-3xl border border-emerald-100 text-sm text-emerald-800">
                                <div className="flex items-center gap-2 mb-4 text-emerald-700 font-bold uppercase tracking-tight">
                                    <Icon name="shield-check" size={20} />
                                    <h2>คำแนะนำในการถนอมแบตเตอรี่</h2>
                                </div>
                                <div className="space-y-2">
                                    <p>• <b>20-80% Rule:</b> ดีที่สุดสำหรับการใช้งานประจำวัน</p>
                                    <p>• <b>LFP Calibration:</b> รุ่น Standard ควรชาร์จเต็ม 100% สัปดาห์ละครั้ง</p>
                                </div>
                            </section>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
